services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: notification_app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_URL: http://localhost:8080
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: notification_service
      DB_USERNAME: app
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_VHOST: notifications
      RABBITMQ_USER: app
      RABBITMQ_PASSWORD: secret
      QUEUE_CONNECTION: rabbitmq
      NOTIFICATION_SMS_GATEWAY: mock
      NOTIFICATION_EMAIL_GATEWAY: mock
      L5_SWAGGER_GENERATE_ALWAYS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - notification_net

  nginx:
    image: nginx:1.25-alpine
    container_name: notification_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./public:/var/www/html/public
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - notification_net

  worker_transactional:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    container_name: notification_worker_transactional
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    command: >
      php artisan queue:work rabbitmq
        --queue=notifications.transactional
        --tries=5
        --timeout=30
        --sleep=1
        --max-time=3600
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: notification_service
      DB_USERNAME: app
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_VHOST: notifications
      RABBITMQ_USER: app
      RABBITMQ_PASSWORD: secret
      QUEUE_CONNECTION: rabbitmq
      NOTIFICATION_SMS_GATEWAY: mock
      NOTIFICATION_EMAIL_GATEWAY: mock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - notification_net

  worker_marketing:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    container_name: notification_worker_marketing
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    command: >
      php artisan queue:work rabbitmq
        --queue=notifications.marketing
        --tries=5
        --timeout=30
        --sleep=3
        --max-time=3600
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: notification_service
      DB_USERNAME: app
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_VHOST: notifications
      RABBITMQ_USER: app
      RABBITMQ_PASSWORD: secret
      QUEUE_CONNECTION: rabbitmq
      NOTIFICATION_SMS_GATEWAY: mock
      NOTIFICATION_EMAIL_GATEWAY: mock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - notification_net

  scheduler:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    container_name: notification_scheduler
    restart: unless-stopped
    command: >
      sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: notification_service
      DB_USERNAME: app
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_VHOST: notifications
      RABBITMQ_USER: app
      RABBITMQ_PASSWORD: secret
      QUEUE_CONNECTION: rabbitmq
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - notification_net

  postgres:
    image: postgres:16-alpine
    container_name: notification_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: notification_service
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d notification_service"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - notification_net

  redis:
    image: redis:7.2-alpine
    container_name: notification_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - notification_net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: notification_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: app
      RABBITMQ_DEFAULT_PASS: secret
      RABBITMQ_DEFAULT_VHOST: notifications
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - notification_net

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  notification_net:
    driver: bridge
